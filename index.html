
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ancestry Waterfall - Family Tree</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f5f5f4;
      --text-main: #1c1917;
      --card-bg: #ffffff;
      --header-bg: rgba(255, 255, 255, 0.4);
      --border-color: #e7e5e4;
    }

    .dark-mode {
      --bg-color: #0c0a09;
      --text-main: #f5f5f4;
      --card-bg: #1c1917;
      --header-bg: rgba(12, 10, 9, 0.6);
      --border-color: #44403c;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    h1, h2, h3 {
      font-family: 'Playfair+Display', serif;
    }

    .waterfall-bg {
      /* Ancient gnarled tree image representing deep legacy and roots */
      background: 
        linear-gradient(rgba(250, 247, 240, 0.9), rgba(245, 240, 225, 0.95)),
        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=2670&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      transition: background 0.5s ease;
    }

    .dark-mode .waterfall-bg {
      background: 
        linear-gradient(rgba(10, 8, 5, 0.92), rgba(15, 12, 10, 0.96)),
        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=2670&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
    }

    .gold-shimmer {
      background: linear-gradient(45deg, #d4af37, #f1d592, #d4af37);
      background-size: 200% 200%;
      animation: shimmer 5s ease infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); transform: scale(1); }
      70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); transform: scale(1.1); }
      100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); transform: scale(1); }
    }
    .hover-pulse:hover {
      animation: pulse-ring 1.5s cubic-bezier(0.66, 0, 0, 1) infinite;
    }

    .times-new-roman {
      font-family: 'Times New Roman', serif;
      font-weight: bold;
    }

    @keyframes node-ripple {
      0% { 
        box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.8), 0 0 0 0 rgba(16, 185, 129, 0.4);
        transform: scale(1);
      }
      30% {
        transform: scale(1.15);
      }
      100% { 
        box-shadow: 0 0 0 40px rgba(212, 175, 55, 0), 0 0 0 70px rgba(16, 185, 129, 0);
        transform: scale(1);
      }
    }
    .ripple-effect {
      animation: node-ripple 0.6s cubic-bezier(0, 0, 0.2, 1);
      z-index: 50;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 10px;
    }
    .dark-mode ::webkit-scrollbar-thumb {
      background: #52525b;
    }
  </style>
<script type="importmap">
{
